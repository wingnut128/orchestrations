services:
  # ── Temporal persistence (Postgres) ─────────────────────────
  temporal-db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal-db-data:/var/lib/postgresql
    restart: unless-stopped

  # ── Temporal server (auto-setup with Postgres) ─────────────
  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-db
    depends_on:
      - temporal-db
    restart: on-failure

  # ── Temporal Web UI ──────────────────────────────────────────
  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8233:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal

  # ── Jaeger (distributed tracing) ──────────────────────────────
  jaeger:
    image: jaegertracing/jaeger:2
    ports:
      - "16686:16686" # Web UI
      - "4318:4318" # OTLP HTTP receiver
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped

  # ── Workers ──────────────────────────────────────────────────
  worker-greeter:
    build: .
    command: ["dist/workers/greeter.js"]
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - OTEL_ENABLED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
    depends_on:
      - temporal
      - jaeger
    restart: on-failure

  # The multi-agent code-review worker (orchestrator + worker + verify
  # child workflows, plus the review/github activities) on the `review` queue.
  worker-review:
    build: .
    command: ["dist/workers/review.js"]
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_API_URL=${GITHUB_API_URL:-https://api.github.com}
      - OTEL_ENABLED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
    depends_on:
      - temporal
      - jaeger
    restart: on-failure

volumes:
  temporal-db-data:
