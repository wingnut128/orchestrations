services:
  # ── Temporal server (dev/local) ──────────────────────────────
  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"
    environment:
      - DB=sqlite
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml

  # ── Temporal Web UI ──────────────────────────────────────────
  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8233:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal

  # ── Workers ──────────────────────────────────────────────────
  worker-greeter:
    build: .
    command: ["dist/workers/greeter.js"]
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal
    restart: on-failure

  worker-ci-pipeline:
    build: .
    command: ["dist/workers/ci-pipeline.js"]
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal
    restart: on-failure

  worker-agent-task:
    build: .
    command: ["dist/workers/agent-task.js"]
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    depends_on:
      - temporal
    restart: on-failure
