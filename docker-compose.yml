services:
  # ── Forgejo lives outside compose at forgejo.cloudreaper.local:8888 ──
  # Workers reach it via the x-forgejo YAML anchor below. .local mDNS
  # doesn't resolve from inside Docker Desktop on macOS, so we pin the
  # IP via extra_hosts. Update FORGEJO_HOST_IP in .env if the LAN changes.

  # ── Temporal persistence (Postgres) ─────────────────────────
  temporal-db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal-db-data:/var/lib/postgresql
    restart: unless-stopped

  # ── Temporal server (auto-setup with Postgres) ─────────────
  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-db
    depends_on:
      - temporal-db
    restart: on-failure

  # ── Temporal Web UI ──────────────────────────────────────────
  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8233:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal

  # ── Jaeger (distributed tracing) ──────────────────────────────
  jaeger:
    image: jaegertracing/jaeger:2
    ports:
      - "16686:16686" # Web UI
      - "4318:4318" # OTLP HTTP receiver
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped

  # ── Workers ──────────────────────────────────────────────────
  worker-greeter:
    build: .
    command: ["dist/workers/greeter.js"]
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - OTEL_ENABLED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
    depends_on:
      - temporal
      - jaeger
    restart: on-failure

  worker-ci-pipeline:
    build: .
    command: ["dist/workers/ci-pipeline.js"]
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - OTEL_ENABLED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
    depends_on:
      - temporal
      - jaeger
    restart: on-failure

  worker-agent-task:
    build: .
    command: ["dist/workers/agent-task.js"]
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OTEL_ENABLED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
    depends_on:
      - temporal
      - jaeger
    restart: on-failure

  worker-code-review:
    build: .
    command: ["dist/workers/code-review.js"]
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - FORGEJO_URL=http://forgejo.cloudreaper.local:8888
      - FORGEJO_TOKEN=${FORGEJO_TOKEN}
      - OTEL_ENABLED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
    extra_hosts:
      - "forgejo.cloudreaper.local:${FORGEJO_HOST_IP:-192.168.1.30}"
    depends_on:
      - temporal
      - jaeger
    restart: on-failure

  worker-security-scan:
    build: .
    command: ["dist/workers/security-scan.js"]
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - SNYK_TOKEN=${SNYK_TOKEN}
      - FORGEJO_URL=http://forgejo.cloudreaper.local:8888
      - FORGEJO_TOKEN=${FORGEJO_TOKEN}
      - OTEL_ENABLED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
    extra_hosts:
      - "forgejo.cloudreaper.local:${FORGEJO_HOST_IP:-192.168.1.30}"
    depends_on:
      - temporal
      - jaeger
    restart: on-failure

volumes:
  temporal-db-data:
