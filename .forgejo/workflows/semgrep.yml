name: Semgrep

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  semgrep:
    name: Scan
    runs-on: docker
    steps:
      - uses: actions/checkout@v6
      - name: Install Semgrep
        run: |
          apt-get update
          apt-get install -y --no-install-recommends python3-pip
          pip install --break-system-packages semgrep
      - run: semgrep scan --config auto --error
