name: Semgrep

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  semgrep:
    name: Scan
    runs-on: docker
    container:
      image: forgejo.cloudreaper.local:8888/mike/ci-tools:latest
    steps:
      - uses: actions/checkout@v6
      - run: semgrep scan --config auto --error
