name: Publish CI tools image

on:
  push:
    branches: [main]
    paths:
      - "ci/ci-tools.Dockerfile"
      - ".forgejo/workflows/publish-ci-tools.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build and push
    runs-on: docker
    steps:
      - name: Install Docker CLI and Buildx
        run: |
          apt-get update
          apt-get install -y --no-install-recommends docker.io docker-buildx
      - uses: actions/checkout@v6
      - name: Log in to Forgejo registry
        uses: docker/login-action@v3
        with:
          registry: forgejo.cloudreaper.local:8888
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ci/ci-tools.Dockerfile
          push: true
          tags: forgejo.cloudreaper.local:8888/mike/ci-tools:latest
