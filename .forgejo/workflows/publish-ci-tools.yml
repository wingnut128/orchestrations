name: Publish CI tools image

on:
  push:
    branches: [main]
    paths:
      - "ci/ci-tools.Dockerfile"
      - ".forgejo/workflows/publish-ci-tools.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build and push
    runs-on: docker
    steps:
      - name: Install Docker CLI
        run: |
          apt-get update
          apt-get install -y --no-install-recommends docker.io
      - uses: actions/checkout@v6
      - name: Log in to Forgejo registry
        run: echo "${{ secrets.REGISTRY_TOKEN }}" | docker login forgejo.cloudreaper.local:8888 -u "${{ github.actor }}" --password-stdin
      - name: Build
        run: docker build -f ci/ci-tools.Dockerfile -t forgejo.cloudreaper.local:8888/mike/ci-tools:latest .
      - name: Push
        run: docker push forgejo.cloudreaper.local:8888/mike/ci-tools:latest
