name: Publish Semgrep CI image

on:
  push:
    branches: [main]
    paths:
      - "ci/semgrep.Dockerfile"
      - ".forgejo/workflows/publish-semgrep-image.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build and push
    runs-on: docker
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - name: Log in to Forgejo registry
        uses: docker/login-action@v3
        with:
          registry: forgejo.cloudreaper.local:8888
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ci/semgrep.Dockerfile
          push: true
          tags: forgejo.cloudreaper.local:8888/mike/semgrep-ci:latest
